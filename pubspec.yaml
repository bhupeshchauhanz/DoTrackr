name: dotrackr
description: "DoTrackr - Premium Todo + Habit Tracker App by Bhupesh Chauhan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_slidable: ^3.1.2
  percent_indicator: ^4.2.4
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0
  screenshot: ^3.0.0
  url_launcher: ^6.3.1
  file_picker: ^8.1.4
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/